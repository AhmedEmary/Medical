name: Deploy to Odoo server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-odoo2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: sudo -u odoo2 /opt/odoo2/deploy-medical.sh
          script_stop: true
          time-out: 120s
